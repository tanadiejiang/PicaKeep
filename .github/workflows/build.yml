name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ===== Linux x64 (.deb, GUI + headless CLI via --server) =====
  linux-amd64-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl dpkg-dev git libgtk-3-dev liblzma-dev libstdc++-12-dev ninja-build pkg-config unzip xz-utils zip libayatana-appindicator3-dev
      - run: |
          git clone --depth 1 --branch master https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package .deb
        run: bash .github/scripts/package_linux_deb.sh amd64
      - uses: actions/upload-artifact@v4
        with:
          name: picakeep-linux-amd64-deb
          path: artifacts/*.deb

  # ===== Linux ARM64 (.deb, GUI + headless CLI via --server) =====
  linux-arm64-deb:
    runs-on: ubuntu-22.04-arm
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl dpkg-dev git libgtk-3-dev liblzma-dev libstdc++-12-dev ninja-build pkg-config unzip xz-utils zip libayatana-appindicator3-dev
      - run: |
          git clone --depth 1 --branch master https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"
      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package .deb
        run: bash .github/scripts/package_linux_deb.sh arm64
      - uses: actions/upload-artifact@v4
        with:
          name: picakeep-linux-arm64-deb
          path: artifacts/*.deb

  # ===== Windows x64 (Inno Setup installer) =====
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build windows --release

      # Combine into publish dir：GUI 二进制 + cli wrapper(指向 GUI exe --server)。
      # 不再用 dart build cli(那是读不到资源的空壳服务端)。
      - run: |
          New-Item -ItemType Directory -Force publish/cli
          Copy-Item -Recurse build/windows/x64/runner/Release/* publish/
          Copy-Item windows/cli/picakeep.cmd publish/cli/
          Copy-Item windows/cli/picakeep.ps1 publish/cli/

      # Generate Inno Setup script
      - run: |
          $ver = (Get-Content pubspec.yaml | Where-Object { $_ -match 'version:\s*(\S+)' } | ForEach-Object { $Matches[1] } | Select-Object -First 1)
          @"
          [Setup]
          AppId={{B8F4A3D2-7E6C-4A1B-9D5F-8E2C7A3B1F04}}
          AppName=PicaKeep
          AppVersion=$ver
          AppPublisher=PicaComic
          DefaultDirName={autopf}\PicaKeep
          DefaultGroupName=PicaKeep
          OutputDir=.\
          OutputBaseFilename=PicaKeep_Setup_v$ver
          SetupIconFile=.\windows\runner\resources\app_icon.ico
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          MinVersion=10.0

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "额外快捷方式:"; Flags: checkedonce
          Name: "clitopath"; Description: "将 picakeep 命令行工具添加到 PATH"; GroupDescription: "其他选项:"; Flags: checkedonce

          [Files]
          Source: "publish\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\PicaKeep"; Filename: "{app}\picakeep.exe"
          Name: "{group}\卸载 PicaKeep"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\PicaKeep"; Filename: "{app}\picakeep.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\picakeep.exe"; Description: "运行 PicaKeep"; Flags: nowait postinstall skipifsilent

          [Code]
          const EnvironmentKey = 'Environment';
          procedure AddToPath(const NewPath: string);
          var OldPath: string;
          begin
            if not RegQueryStringValue(HKCU, EnvironmentKey, 'PATH', OldPath) then OldPath := '';
            if Pos(';' + Uppercase(NewPath) + ';', ';' + Uppercase(OldPath) + ';') > 0 then Exit;
            if OldPath <> '' then OldPath := OldPath + ';';
            RegWriteStringValue(HKCU, EnvironmentKey, 'PATH', OldPath + NewPath);
          end;
          procedure CurStepChanged(CurStep: TSetupStep);
          begin
            if CurStep = ssPostInstall then
              if WizardIsTaskSelected('clitopath') then
                AddToPath(ExpandConstant('{app}\cli'));
          end;
          "@ | Out-File -FilePath installer.iss -Encoding Default

      # Install Inno Setup & compile installer
      - run: choco install innosetup -y --no-progress
      - run: |
          $iscc = (Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" | Select-Object -First 1).FullName
          & $iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: picakeep-windows-x64
          path: PicaKeep_Setup_v*.exe

  # ===== Windows ARM64 (Inno Setup installer) =====
  windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --depth 1 --branch master https://github.com/flutter/flutter.git "$env:RUNNER_TEMP\flutter"
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\flutter\bin"
      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter build windows --release

      # Combine into publish dir：GUI 二进制 + cli wrapper(指向 GUI exe --server)。
      - run: |
          New-Item -ItemType Directory -Force publish/cli
          Copy-Item -Recurse build/windows/arm64/runner/Release/* publish/
          Copy-Item windows/cli/picakeep.cmd publish/cli/
          Copy-Item windows/cli/picakeep.ps1 publish/cli/

      # Generate Inno Setup script (ARM64)
      - run: |
          $ver = (Get-Content pubspec.yaml | Where-Object { $_ -match 'version:\s*(\S+)' } | ForEach-Object { $Matches[1] } | Select-Object -First 1)
          @"
          [Setup]
          AppId={{B8F4A3D2-7E6C-4A1B-9D5F-8E2C7A3B1F04}}
          AppName=PicaKeep
          AppVersion=$ver
          AppPublisher=PicaComic
          DefaultDirName={autopf}\PicaKeep
          DefaultGroupName=PicaKeep
          OutputDir=.\
          OutputBaseFilename=PicaKeep_ARM64_Setup_v$ver
          SetupIconFile=.\windows\runner\resources\app_icon.ico
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest
          ArchitecturesAllowed=arm64
          ArchitecturesInstallIn64BitMode=arm64
          MinVersion=10.0

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "额外快捷方式:"; Flags: checkedonce
          Name: "clitopath"; Description: "将 picakeep 命令行工具添加到 PATH"; GroupDescription: "其他选项:"; Flags: checkedonce

          [Files]
          Source: "publish\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\PicaKeep"; Filename: "{app}\picakeep.exe"
          Name: "{group}\卸载 PicaKeep"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\PicaKeep"; Filename: "{app}\picakeep.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\picakeep.exe"; Description: "运行 PicaKeep"; Flags: nowait postinstall skipifsilent

          [Code]
          const EnvironmentKey = 'Environment';
          procedure AddToPath(const NewPath: string);
          var OldPath: string;
          begin
            if not RegQueryStringValue(HKCU, EnvironmentKey, 'PATH', OldPath) then OldPath := '';
            if Pos(';' + Uppercase(NewPath) + ';', ';' + Uppercase(OldPath) + ';') > 0 then Exit;
            if OldPath <> '' then OldPath := OldPath + ';';
            RegWriteStringValue(HKCU, EnvironmentKey, 'PATH', OldPath + NewPath);
          end;
          procedure CurStepChanged(CurStep: TSetupStep);
          begin
            if CurStep = ssPostInstall then
              if WizardIsTaskSelected('clitopath') then
                AddToPath(ExpandConstant('{app}\cli'));
          end;
          "@ | Out-File -FilePath installer.iss -Encoding Default

      # Install Inno Setup & compile installer
      - run: choco install innosetup -y --no-progress
      - run: |
          $iscc = (Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" | Select-Object -First 1).FullName
          & $iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: picakeep-windows-arm64
          path: PicaKeep_ARM64_Setup_v*.exe
