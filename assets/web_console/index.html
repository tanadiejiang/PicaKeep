<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#7c9cff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PicaKeep">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script>
    (function () {
      try {
        var mode = window.localStorage.getItem('pk-console-theme-mode') || 'system';
        var accent = window.localStorage.getItem('pk-console-theme-color') || 'dynamic';
        var pureBlack = window.localStorage.getItem('pk-console-pure-black') || '0';
        var dark = mode === 'dark' || (mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var root = document.documentElement;
        root.dataset.themeMode = mode;
        root.dataset.effectiveTheme = dark ? 'dark' : 'light';
        root.dataset.accent = accent;
        root.dataset.pureBlack = pureBlack === '1' ? '1' : '0';
      } catch (_) {}
    })();
  </script>
  <title>PicaKeep Console</title>
  <link rel="icon" type="image/svg+xml" href="/pica-icon.svg">
  <link rel="apple-touch-icon" href="/pica-icon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="login-mask"></div>
  <div id="console-shell" hidden>
    <header id="topbar" class="topbar-collapsed">
      <button id="topbar-toggle" class="topbar-toggle" type="button" aria-expanded="false">☰</button>
      <div class="topbar-brand">
        <img class="console-brand-icon" src="/pica-icon.svg" alt="" aria-hidden="true">
        <div class="brand">PicaKeep Console</div>
        <div class="sub">网页后台 · 应用面板与管理面板</div>
      </div>
      <nav id="mode-switch" aria-label="面板模式"></nav>
      <div class="topbar-avatar-wrap" id="topbar-avatar-wrap">
        <button id="top-avatar" class="topbar-avatar" type="button" aria-haspopup="true" aria-expanded="false" aria-label="打开用户菜单"></button>
        <div id="top-avatar-menu" class="topbar-avatar-menu" hidden></div>
      </div>
    </header>
    <main id="console-root"></main>
  </div>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
</body>
</html>
