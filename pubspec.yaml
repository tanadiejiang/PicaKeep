name: picakeep
description: "PicaKeep - 本地漫画阅读器 / 收藏管理器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.16
  dynamic_color: ^1.6.9
  crypto: any
  photo_view:
    git:
      url: https://github.com/wgh136/photo_view
      ref: a1255d1
  url_launcher: ^6.1.8
  path_provider: ^2.0.12
  shimmer_animation: ^2.1.0
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_displaymode: 0.6.0
  flutter_reorderable_grid_view: 5.0.1
  sqlite3: 2.1.0
  sliver_tools: ^0.2.12
  collection: ^1.18.0
  uuid: ^3.0.7
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tags.json
    - assets/translation.json
    - assets/tags_tw.json
    - assets/init.js
